<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Browser acts like a mobile device -->
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Primark In-Store Navigation App</title>
    <link rel="stylesheet" href="../css/homepage.css">
</head>

<body>

<div class="phone">

    <header>
        <h1>Store Navigation</h1>
    </header>

    <div class="container">

        <img src="../images/primark-logo.png" class="logo">

        <div class="hp-images">
            <img src="../images/hp1.png" class="hp1">
            <img src="../images/hp2.png" class="hp2">
            <img src="../images/hp3.png" class="hp3">
        </div>

    </div>

    <footer>
        <button class="search-btn" onclick="goToSearch()">Search Product</button>
        <button class="map-btn" onclick="goToMap()">View Store Map</button>
    </footer>
    
    <div class="text-box">
        <p class="headline">Let's get started!</p>
        <p class="description">
            By using the indoor navigation app you can quickly
            reach your desired location with ease. 
            Enjoy shopping!
        </p>
    </div>

</div>


<script src="../js/homepage.js"></script>

</body>
